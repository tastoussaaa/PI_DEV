# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
parameters:
    upload_dir: '%kernel.project_dir%/public/uploads'
    pdf_directory: '%kernel.project_dir%/public/uploads/pdfs%'
    api_key: '%env(GSK_API_KEY)%'
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
# Twilio credentials should be provided via environment variables for local
# development and production. Do NOT hard-code secrets here.
# Expected env vars: TWILIO_SID, TWILIO_TOKEN
# Optional: TWILIO_FROM (specific phone number) or TWILIO_MESSAGING_SERVICE_SID (Messaging Service)
# Use MessagingServiceSid for better management of phone numbers and scaling

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/Service/AppScheduleProvider.php'

    App\Service\PDFGenerator:
        arguments:
            $uploadDir: '%upload_dir%'

    App\EventListener\DemandeAutoMatchingListener:
        tags:
            - { name: doctrine.event_subscriber }

    App\Service\AiRiskAnalysisService:
        class: App\Service\MockAiRiskAnalysisService
        public: true

    App\Service\RiskSupervisionService:
        public: true

    App\Service\AiDescriptionService:
        arguments:
            $apiKey: '%env(GROQ_API_KEY)%'

    App\Service\OpenAIService:
        arguments:
            $openaiApiKey: '%env(OPENAI_API_KEY)%'

    # BotMan
    App\Service\BotManFactory:
        arguments:
            $cacheDir: '%kernel.cache_dir%'
            $container: '@service_container'

    BotMan\BotMan\BotMan:
        factory: ['@App\Service\BotManFactory', 'create']
        public: true

    App\Repository\FormationRepository:
        public: true

    AhmedBhs\DoctrineDoctor\Analyzer\Integrity\TimestampableTraitAnalyzer:
        autowire: true
        autoconfigure: false
        tags: []

    AhmedBhs\DoctrineDoctor\Analyzer\Integrity\PrimaryKeyStrategyAnalyzer:
        autowire: true
        autoconfigure: false
        tags: []

